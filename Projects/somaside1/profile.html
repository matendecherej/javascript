<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soma Side | Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }
    html { scroll-behavior: smooth; }

    :root {
      --plum:      #1e0130;
      --plum-mid:  #2e0a3f;
      --plum-lt:   #3d1260;
      --purple:    #7b2fbe;
      --violet:    #b06aff;
      --gold:      #e8b84b;
      --white:     #ffffff;
      --muted:     rgba(255,255,255,0.55);
      --muted-lt:  rgba(255,255,255,0.32);
      --radius:    20px;
      --radius-lg: 28px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--plum);
      color: var(--white);
      overflow-x: hidden;
      min-height: 100vh;
    }

    a { text-decoration: none; color: inherit; }

    /* ── CURSOR ── */
    .cursor {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--gold);
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%, -50%);
      transition: transform 0.12s ease, width 0.2s, height 0.2s, background 0.2s;
      mix-blend-mode: difference;
    }
    .cursor.expand { width: 40px; height: 40px; background: var(--violet); }

    /* ── NOISE ── */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAVBAR ── */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(30,1,48,0.88);
      backdrop-filter: blur(18px);
      padding: 0 2.5rem;
      height: 65px;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .navbar .logo img { height: 40px; width: auto; object-fit: contain; }
    .nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }

    .nav-links a {
      color: rgba(255,255,255,0.65);
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.05em;
      padding: 0.4rem 0;
      position: relative;
      transition: color 0.2s;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      bottom: -2px; left: 0;
      width: 0; height: 2px;
      background: var(--gold);
      transition: width 0.3s ease;
    }

    .nav-links a:hover, .nav-links a.active { color: var(--gold); }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
    .menu-toggle { display: none; font-size: 1.5rem; color: #fff; background: none; border: none; }

    /* ── BANNER ── */
    .profile-banner {
      height: 260px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #0d0018 0%, #2e0a3f 55%, #1a0030 100%);
    }

    .profile-banner::before {
      content: "";
      position: absolute; inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 38px, rgba(123,47,190,0.07) 38px, rgba(123,47,190,0.07) 39px),
        repeating-linear-gradient(90deg, transparent, transparent 38px, rgba(232,184,75,0.04) 38px, rgba(232,184,75,0.04) 39px);
    }

    .banner-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      pointer-events: none;
    }

    .banner-orb-1 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(123,47,190,0.55), transparent 70%);
      top: -120px; right: 8%;
    }

    .banner-orb-2 {
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(232,184,75,0.18), transparent 70%);
      bottom: -60px; left: 8%;
    }

    .banner-stripe {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: repeating-linear-gradient(
        90deg,
        var(--gold) 0, var(--gold) 22px,
        transparent 22px, transparent 44px,
        var(--violet) 44px, var(--violet) 66px,
        transparent 66px, transparent 88px
      );
      opacity: 0.55;
    }

    /* ── PROFILE OUTER WRAPPER ── */
    .profile-outer {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
      position: relative;
      z-index: 10;
    }

    /* ── IDENTITY BLOCK ── */
    .profile-identity {
      display: flex;
      align-items: flex-end;
      gap: 1.8rem;
      margin-top: -64px;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar */
    .avatar-ring {
      width: 128px; height: 128px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, var(--gold), var(--violet));
      flex-shrink: 0;
      box-shadow: 0 14px 45px rgba(0,0,0,0.55);
    }

    .avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: linear-gradient(145deg, #3d1260, #7b2fbe);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      overflow: hidden;
      border: 3px solid var(--plum);
    }

    .avatar-inner img { width: 100%; height: 100%; object-fit: cover; }

    /* Text */
    .identity-text { flex-grow: 1; padding-bottom: 0.5rem; }

    .identity-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.7rem, 3vw, 2.3rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 0.25rem;
    }

    .identity-handle {
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--violet);
      letter-spacing: 0.06em;
      margin-bottom: 0.55rem;
    }

    .identity-bio {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 420px;
      margin-bottom: 0.4rem;
    }

    .identity-joined {
      font-size: 0.74rem;
      color: var(--muted-lt);
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .edit-btn {
      align-self: flex-end;
      padding: 0.55rem 1.4rem;
      border-radius: 50px;
      border: 1.5px solid rgba(232,184,75,0.4);
      background: transparent;
      color: var(--gold);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      white-space: nowrap;
      margin-bottom: 0.5rem;
    }

    .edit-btn:hover { background: var(--gold); color: var(--plum); border-color: var(--gold); }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s 0.15s ease both;
    }

    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 1.5rem 1rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: background 0.3s, border-color 0.3s, transform 0.3s;
    }

    .stat-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--purple), var(--violet));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .stat-card:hover { background: rgba(123,47,190,0.12); border-color: rgba(176,106,255,0.28); transform: translateY(-4px); }
    .stat-card:hover::before { opacity: 1; }

    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 0.3rem;
    }

    .stat-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── DIVIDER ── */
    .gold-divider {
      height: 2px;
      background: repeating-linear-gradient(
        90deg, var(--gold) 0, var(--gold) 16px,
        transparent 16px, transparent 32px
      );
      opacity: 0.28;
      margin-bottom: 2.5rem;
    }

    /* ── TABS ── */
    .tab-nav {
      display: flex;
      gap: 0.3rem;
      margin-bottom: 2rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50px;
      padding: 0.3rem;
      width: fit-content;
      animation: fadeUp 0.6s 0.25s ease both;
    }

    .tab-btn {
      padding: 0.55rem 1.5rem;
      border-radius: 50px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      transition: background 0.2s, color 0.2s;
    }

    .tab-btn:hover { color: var(--white); }
    .tab-btn.active { background: var(--gold); color: var(--plum); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── STORY GRID ── */
    .profile-story-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 1.2rem;
      padding-bottom: 4rem;
    }

    .profile-story-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
    }

    .profile-story-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--purple), var(--violet));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .profile-story-card:hover { transform: translateY(-6px); box-shadow: 0 20px 45px rgba(0,0,0,0.4); border-color: rgba(176,106,255,0.3); }
    .profile-story-card:hover::before { opacity: 1; }

    .psc-cover { height: 110px; }

    .psc-body { padding: 1rem 1.1rem 1.2rem; }

    .psc-body h4 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--white);
      margin: 0.35rem 0 0.25rem;
      line-height: 1.3;
    }

    .psc-meta { font-size: 0.76rem; color: var(--muted-lt); }

    /* ── TAGS ── */
    .tag {
      display: inline-block;
      padding: 0.18rem 0.65rem;
      border-radius: 50px;
      font-family: 'Syne', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .tag.poem  { background: rgba(176,106,255,0.2); color: #c8a0ff; }
    .tag.story { background: rgba(100,150,255,0.15); color: #8ab4ff; }
    .tag.song  { background: rgba(100,220,160,0.15); color: #6adfb0; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      grid-column: 1 / -1;
    }

    .empty-icon { font-size: 2.8rem; margin-bottom: 1rem; opacity: 0.45; }
    .empty-state p { margin-bottom: 1.2rem; font-size: 0.92rem; }

    .empty-state a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--gold);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      border: 1.5px solid rgba(232,184,75,0.4);
      padding: 0.5rem 1.3rem;
      border-radius: 50px;
      transition: background 0.2s, color 0.2s;
    }

    .empty-state a:hover { background: var(--gold); color: var(--plum); }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .profile-identity { flex-direction: column; align-items: flex-start; margin-top: -48px; gap: 1rem; }
      .avatar-ring { width: 96px; height: 96px; }
      .stat-num { font-size: 1.8rem; }
      .navbar { padding: 0 1.2rem; }
      .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 65px; left: 0; right: 0;
        background: #1e0130;
        padding: 1rem 1.5rem;
        gap: 0.5rem;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .nav-links.active { display: flex; }
      .menu-toggle { display: block; }
      .tab-nav { width: 100%; }
      .profile-story-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 420px) {
      .profile-story-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-page="profile">

  <!-- CURSOR -->
  <div class="cursor" id="cursor"></div>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo"><img src="assets/logo.PNG" alt="Soma Side"></div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="home.html">Stories</a></li>
      <li><a href="upload.html">Write</a></li>
      <li><a href="profile.html" class="active">Profile</a></li>
    </ul>
    <button class="menu-toggle" id="menuToggle">☰</button>
  </header>

  <!-- BANNER -->
  <div class="profile-banner">
    <div class="banner-orb banner-orb-1"></div>
    <div class="banner-orb banner-orb-2"></div>
    <div class="banner-stripe"></div>
  </div>

  <!-- PROFILE CONTENT -->
  <div class="profile-outer">

    <!-- IDENTITY -->
    <div class="profile-identity">
      <div class="avatar-ring">
        <div class="avatar-inner" id="avatarEl">🌍</div>
      </div>

      <div class="identity-text">
        <h1 id="profileName">—</h1>
        <p class="identity-handle" id="profileHandle">—</p>
        <p class="identity-bio" id="profileBio">—</p>
        <p class="identity-joined" id="profileJoined">—</p>
      </div>

      <button class="edit-btn">✎ Edit Profile</button>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="statPublished">0</div>
        <div class="stat-label">Published</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statBookmarked">0</div>
        <div class="stat-label">Bookmarked</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statLikes">0</div>
        <div class="stat-label">Total Likes</div>
      </div>
    </div>

    <div class="gold-divider"></div>

    <!-- TABS -->
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="published">✦ My Works</button>
      <button class="tab-btn" data-tab="bookmarked">🔖 Bookmarked</button>
    </div>

    <div class="tab-panel active" id="tab-published">
      <div class="profile-story-grid" id="profileStoriesGrid"></div>
    </div>

    <div class="tab-panel" id="tab-bookmarked">
      <div class="profile-story-grid" id="bookmarkedGrid"></div>
    </div>

  </div>

  <script src="js/data.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/main.js"></script>

  <script>
    // ── Cursor ──
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });
    document.querySelectorAll('a, button, .profile-story-card, .stat-card').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('expand'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('expand'));
    });

    // ── Tabs ──
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
      });
    });

    // ── Mobile nav ──
    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('active');
    });
  </script>
</body>
</html>
